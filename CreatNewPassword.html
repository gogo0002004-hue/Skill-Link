<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - SkillLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .logo-top {
            position: absolute;
            top: 30px;
            left: 50px;
            font-size: 26px;
            font-weight: 800;
            color: #000;
            font-family: 'Dancing Script', cursive;
        }

        .logo-top span {
            color: #009688;
        }

        input::-ms-reveal,
        input::-ms-clear {
            display: none !important;
        }

        form {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 25px;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid #151414;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #00897b;
            font-weight: 700;
        }

        .field-container {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 30px;
            padding: 12px 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .input-group:focus-within {
            border-color: #009688;
            box-shadow: 0 0 10px rgba(0, 150, 136, 0.1);
        }

        .input-group i {
            color: #999999;
            margin-right: 15px;
            font-size: 18px;
        }

        .input-group input {
            border: none;
            outline: none;
            background: transparent;
            flex-grow: 1;
            padding: 0;
            font-size: 16px;
            color: #333333;
            z-index: 2;
        }

        .input-group label {
            position: absolute;
            left: 55px;
            top: 50%;
            transform: translateY(-50%);
            color: #888888;
            pointer-events: none;
            transition: all 0.3s ease;
            font-size: 16px;
            z-index: 1;
        }

        .input-group input:focus~label,
        .input-group input:not(:placeholder-shown)~label {
            top: -12px;
            left: 15px;
            font-size: 13px;
            color: #ffffff;
            background: #00897b;
            padding: 2px 8px;
            border-radius: 5px;
        }

        .input-group input::placeholder {
            color: transparent;
        }

        .toggle-password {
            cursor: pointer;
            color: #999 !important;
            margin-left: 10px;
            z-index: 3;
            transition: 0.3s;
        }

        .toggle-password:hover {
            color: #009688 !important;
        }

        .button {
            display: block;
            width: 100%;
            background: #009688;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            padding: 14px 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 150, 136, 0.2);
        }

        .button:hover:not(:disabled) {
            background: #00796b;
            transform: translateY(-2px);
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .error-message {
            font-size: 12px;
            color: #e53935;
            margin-top: 5px;
            display: block;
            margin-left: 15px;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="logo-top">S<span>killLink</span></div>

        <form @submit.prevent="handleResetPassword">
            <h1>Create New Password</h1>

            <div class="field-container">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input :type="isPassVisible ? 'text' : 'password'" v-model="password" id="password" placeholder=" "
                        required>
                    <label for="password">New Password</label>
                    <i :class="['fas', isPassVisible ? 'fa-eye' : 'fa-eye-slash', 'toggle-password']"
                        @click="isPassVisible = !isPassVisible"></i>
                </div>
                <span class="error-message" v-if="passwordError">{{ passwordError }}</span>
            </div>

            <div class="field-container">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input :type="isConfirmVisible ? 'text' : 'password'" v-model="confirmPassword" id="confirmPassword"
                        placeholder=" " required>
                    <label for="confirmPassword">Confirm Password</label>
                    <i :class="['fas', isConfirmVisible ? 'fa-eye' : 'fa-eye-slash', 'toggle-password']"
                        @click="isConfirmVisible = !isConfirmVisible"></i>
                </div>
                <span class="error-message" v-if="confirmError">{{ confirmError }}</span>
            </div>

            <button class="button" type="submit" :disabled="loading">
                <span v-if="loading">Resetting Password...</span>
                <span v-else>Update Password</span>
            </button>
        </form>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    password: '',
                    confirmPassword: '',
                    passwordError: '',
                    confirmError: '',
                    isPassVisible: false,
                    isConfirmVisible: false,
                    loading: false
                }
            },
            methods: {
                async handleResetPassword() {
                    this.passwordError = "";
                    this.confirmError = "";

                    const savedEmail = sessionStorage.getItem("userEmail");
                    const savedCode = sessionStorage.getItem("resetCode");

                    if (!savedEmail || !savedCode) {
                        alert("⚠️ Session expired. Please request a new code.");
                        window.location.href = "ForgetPassword.html";
                        return;
                    }

                    if (this.password !== this.confirmPassword) {
                        this.confirmError = "⚠️ Passwords do not match.";
                        return;
                    }

                    if (this.password.length < 6) {
                        this.passwordError = "⚠️ Password must be at least 6 characters.";
                        return;
                    }

                    this.loading = true;

                    try {
                        const response = await axios.post("https://corsproxy.io/?https://skilllinkapi.ddns.net/auth/reset-password", {
                            email: savedEmail,
                            code: savedCode.toString(),
                            password: this.password,
                            type: "user"
                        });

                        if (response.data.success) {

                            sessionStorage.clear();
                            window.location.href = "Login.html";
                        } else {
                            alert("❌ Error: " + (response.data.message || "Could not reset password."));
                        }
                    } catch (err) {
                        console.error("Full Error Object:", err.response?.data);
                        const message = err.response?.data?.message || "An unexpected error occurred.";
                        alert("❌ Reset Failed: " + message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>

</html>
