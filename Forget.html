<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .logo-top {
            position: absolute;
            top: 30px;
            left: 50px;
            font-size: 26px;
            font-weight: 800;
            color: #000;
            font-family: 'Dancing Script', cursive;
        }

        .logo-top span {
            color: #009688;
        }

        form {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 25px;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            border: 1px solid #181515;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #00897b;
        }

        .instruction-text {
            color: #555555;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .field-container {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 30px;
            padding: 12px 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .input-group:focus-within {
            border-color: #009688;
            box-shadow: 0 0 10px rgba(0, 150, 136, 0.1);
        }

        .input-group i {
            color: #999999;
            margin-right: 15px;
            font-size: 20px;
        }

        .input-group input {
            border: none;
            outline: none;
            background: transparent;
            flex-grow: 1;
            padding: 0;
            font-size: 16px;
            color: #333333;
            z-index: 2;
        }

        .input-group label {
            position: absolute;
            left: 55px;
            top: 50%;
            transform: translateY(-50%);
            color: #888888;
            pointer-events: none;
            transition: all 0.3s ease;
            font-size: 16px;
            z-index: 1;
        }

        .input-group input:focus~label,
        .input-group input:not(:placeholder-shown)~label {
            top: -12px;
            left: 15px;
            font-size: 13px;
            color: #ffffff;
            background: #00897b;
            padding: 2px 8px;
            border-radius: 5px;
        }

        .input-group input::placeholder {
            color: transparent;
        }

        .button {
            display: block;
            width: 100%;
            background: #009688;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            padding: 14px 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 150, 136, 0.2);
        }

        .button:hover {
            background: #00796b;
            transform: translateY(-2px);
        }

        .back-link {
            font-size: 15px;
            margin-top: 25px;
        }

        .back-link a {
            color: #009688;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            font-size: 13px;
            color: #e53935;
            margin-top: 8px;
            display: block;
            margin-left: 15px;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="logo-top">S<span>killLink</span></div>

        <form @submit.prevent="handleSubmit">
            <h1>Forgot password?</h1>

            <p class="instruction-text">
                Please enter your Email below, then we will help you to recover your account.
            </p>

            <div class="field-container">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" v-model="emailOrPhone" id="emailOrPhoneInput" placeholder=" " required>
                    <label for="emailOrPhoneInput">Email Address</label>
                </div>
                <span class="error-message" v-if="error">{{ error }}</span>
            </div>

            <button class="button" type="submit" :disabled="loading">
                <span v-if="loading">Sending...</span>
                <span v-else>Next</span>
            </button>

            <div class="back-link">
                <a href="Login.html"><i class="fas fa-chevron-left" style="font-size: 12px;"></i> Back to Login</a>
            </div>
        </form>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    emailOrPhone: '',
                    error: '',
                    loading: false
                }
            },
            methods: {
                isValidEmail(input) {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    return emailRegex.test(input);
                },

                async handleSubmit() {
                    this.error = "";

                    if (this.emailOrPhone.trim() === "") {
                        this.error = "⚠️ Please enter your Email Address.";
                        return;
                    }

                    if (!this.isValidEmail(this.emailOrPhone)) {
                        this.error = "❌ Please enter a valid Email Address.";
                        return;
                    }

                    this.loading = true;

                    try {
                        const response = await axios.post("https://corsproxy.io/?https://skilllinkapi.ddns.net/auth/forget-password", {
                            email: this.emailOrPhone,
                            type: "user"
                        });

                        if (response.status === 200 || response.data.success) {
                            sessionStorage.setItem("userEmail", this.emailOrPhone);

                            window.location.href = "OTP.html";
                        }

                    } catch (err) {
                        console.error("API Error:", err.response?.data);
                        this.error = "❌ " + (err.response?.data?.message || "Internal Server Error. Please try again.");
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>

</html>
